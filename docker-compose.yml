services:
  ludotek:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - game-data:/app/prisma
      - cache-data:/app/data
      - upload-temp:/tmp/ludotek-uploads
    environment:
      - DATABASE_URL=file:/app/prisma/games.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-3.1-flash-lite-preview}
    restart: unless-stopped

volumes:
  game-data:
  cache-data:
  upload-temp:
